services:
  app:
    build: ./app
    ports:
      - "8080:5000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: notesdb
      DB_USER: notes
      DB_PASSWORD: notes
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notesdb"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
